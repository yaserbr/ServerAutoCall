<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoCall</title>
    <style>
        :root {
            --bg-1: #0f172a;
            --bg-2: #0b2447;
            --accent: #2ec4b6;
            --accent-soft: #67e8f9;
            --text: #e6edf7;
            --muted: #a8b5c9;
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at 15% 20%, rgba(46, 196, 182, 0.22), transparent 35%),
                radial-gradient(circle at 85% 10%, rgba(103, 232, 249, 0.2), transparent 30%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            padding: 24px;
        }

        .container {
            max-width: 1050px;
            margin: 0 auto;
            display: grid;
            gap: 18px;
        }

        .header {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            border-radius: 20px;
            padding: 18px 20px;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 0.4px;
        }

        .header p {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .header-controls {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 18px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .card h2 {
            margin: 0 0 14px;
            font-size: 1.05rem;
            font-weight: 600;
            color: #f3f7ff;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .toggle-button {
            opacity: 0.82;
        }

        .toggle-button.active {
            opacity: 1;
            box-shadow: 0 10px 24px rgba(46, 196, 182, 0.5);
            transform: translateY(-1px);
        }

        .segmented-control {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.24);
            background: rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            margin-bottom: 14px;
        }

        .segmented-option {
            min-width: 110px;
            border: 0;
            border-radius: 999px;
            padding: 9px 18px;
            font-weight: 700;
            color: rgba(230, 237, 247, 0.72);
            background: transparent;
            box-shadow: none;
            transition: background-color 0.25s ease, color 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
        }

        .segmented-option:hover {
            transform: none;
            box-shadow: none;
            color: rgba(230, 237, 247, 0.95);
            background: rgba(255, 255, 255, 0.1);
        }

        .segmented-option.active {
            color: #0f172a;
            background: #ffffff;
            box-shadow: 0 8px 18px rgba(5, 10, 25, 0.22);
        }

        .segmented-option.active:hover {
            transform: none;
            box-shadow: 0 8px 18px rgba(5, 10, 25, 0.22);
            background: #ffffff;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .panel-hidden {
            display: none;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        button {
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 12px;
            padding: 10px 14px;
            color: #06272f;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent-soft));
            transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 6px 18px rgba(46, 196, 182, 0.35);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 22px rgba(46, 196, 182, 0.45);
        }

        button:active {
            transform: translateY(0);
            opacity: 0.95;
        }

        .danger-button {
            color: #fff5f5;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 6px 18px rgba(220, 38, 38, 0.45);
        }

        .danger-button:hover {
            box-shadow: 0 10px 22px rgba(220, 38, 38, 0.58);
        }

        .input-row {
            display: grid;
            gap: 10px;
            margin-bottom: 12px;
        }

        .field-label {
            font-size: 0.84rem;
            color: var(--muted);
            margin-top: -2px;
            margin-bottom: -4px;
        }

        input,
        select,
        textarea {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 12px;
            padding: 10px 12px;
            background: rgba(11, 18, 32, 0.35);
            color: var(--text);
            outline: none;
        }

        input::placeholder {
            color: #bfd0ea;
            opacity: 0.7;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: rgba(103, 232, 249, 0.75);
            box-shadow: 0 0 0 3px rgba(103, 232, 249, 0.18);
        }

        textarea {
            min-height: 96px;
            resize: vertical;
            font-family: inherit;
        }

        pre {
            margin: 0;
            padding: 12px;
            min-height: 170px;
            max-height: 340px;
            overflow: auto;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(3, 8, 20, 0.45);
            color: #d9e8ff;
            line-height: 1.45;
            font-size: 0.86rem;
        }

        @media (max-width: 640px) {
            body {
                padding: 14px;
            }

            .card,
            .header {
                border-radius: 16px;
                padding: 14px;
            }
        }
    </style>
</head>

<body>
    <main class="container">
        <section class="header">
            <h1>AutoCall Control Panel</h1>
            <p>Simple glass UI for monitoring devices and sending CALL / SMS commands.</p>
            <div class="header-controls">
                <button id="toggleDevicesBtn" class="toggle-button" onclick="togglePanel('devices')">Devices</button>
                <button id="toggleCommandsBtn" class="toggle-button" onclick="togglePanel('commands')">Commands</button>
            </div>
        </section>

        <section class="grid">
            <article class="card full-width">
                <h2>Command Center</h2>
                <div class="segmented-control" role="tablist" aria-label="Call SMS Toggle">
                    <button id="callTabBtn" class="segmented-option active" role="tab" aria-selected="true"
                        onclick="setActionTab('call')">Call</button>
                    <button id="smsTabBtn" class="segmented-option" role="tab" aria-selected="false"
                        onclick="setActionTab('sms')">SMS</button>
                </div>
                <div id="callTabPanel" class="tab-panel active">
                    <h2>Send Call</h2>
                    <div class="input-row">
                        <select id="deviceSelect"></select>
                        <input id="phone" placeholder="phone number" />
                        <label class="field-label" for="durationSeconds">Call duration (seconds)</label>
                        <input id="durationSeconds" type="text" inputmode="numeric" pattern="[0-9]*"
                            placeholder="18" oninput="sanitizeDurationInput(event)" />
                        <input type="datetime-local" id="scheduleTime" />
                    </div>
                    <div class="actions">
                        <button onclick="sendCall()">Call</button>
                        <button class="danger-button" onclick="sendEndCall()">End Call</button>
                    </div>
                </div>
                <div id="smsTabPanel" class="tab-panel">
                    <h2>Send SMS</h2>
                    <div class="input-row">
                        <select id="deviceSelectSms"></select>
                        <input id="smsPhone" placeholder="phone number" />
                        <textarea id="smsMessage" placeholder="SMS message"></textarea>
                        <input type="datetime-local" id="smsScheduleTime" />
                    </div>
                    <div class="actions">
                        <button onclick="sendSms()">Send SMS</button>
                    </div>
                </div>
            </article>

            <article id="devicesPanel" class="card full-width panel-hidden">
                <h2>Devices</h2>
                <div class="actions">
                    <button onclick="loadDevices()">Refresh</button>
                </div>
                <pre id="devices"></pre>
            </article>

            <article id="commandsPanel" class="card full-width panel-hidden">
                <h2>Commands</h2>
                <div class="actions">
                    <button onclick="loadCommands()">Refresh</button>
                    <button onclick="clearCommands()">Clear Commands</button>
                </div>
                <pre id="commands"></pre>
            </article>
        </section>
    </main>

    <script>
        const SERVER =
            window.location.hostname === "localhost"
                ? "http://localhost:4000"
                : "https://serverautocall-production.up.railway.app";
        let activeTab = "call";
        const panelVisibility = {
            devices: false,
            commands: false
        };

        function setActionTab(tab) {
            activeTab = tab;
            const isCall = activeTab === "call";

            document.getElementById("callTabPanel").classList.toggle("active", isCall);
            document.getElementById("smsTabPanel").classList.toggle("active", !isCall);
            document.getElementById("callTabBtn").classList.toggle("active", isCall);
            document.getElementById("smsTabBtn").classList.toggle("active", !isCall);
            document.getElementById("callTabBtn").setAttribute("aria-selected", String(isCall));
            document.getElementById("smsTabBtn").setAttribute("aria-selected", String(!isCall));
        }

        async function togglePanel(panelName) {
            const isDevices = panelName === "devices";
            const panelId = isDevices ? "devicesPanel" : "commandsPanel";
            const buttonId = isDevices ? "toggleDevicesBtn" : "toggleCommandsBtn";

            panelVisibility[panelName] = !panelVisibility[panelName];
            const isVisible = panelVisibility[panelName];

            document.getElementById(panelId).classList.toggle("panel-hidden", !isVisible);
            document.getElementById(buttonId).classList.toggle("active", isVisible);

            if (isVisible) {
                if (isDevices) {
                    await loadDevices();
                } else {
                    await loadCommands();
                }
            }
        }

        async function loadDevices() {
            try {
                const res = await fetch(SERVER + "/devices");
                if (!res.ok) throw new Error("Failed to load devices");
                const data = await res.json();
                document.getElementById("devices").innerText =
                    JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById("devices").innerText = JSON.stringify({
                    error: error.message
                }, null, 2);
            }
        }

        async function loadDevicesToSelect() {
            try {
                const res = await fetch(SERVER + "/devices");
                if (!res.ok) throw new Error("Failed to load devices");
                const data = await res.json();
                const callSelect = document.getElementById("deviceSelect");
                const smsSelect = document.getElementById("deviceSelectSms");
                const previousCallValue = callSelect.value;
                const previousSmsValue = smsSelect.value;

                populateDeviceSelect(callSelect, data, previousCallValue);
                populateDeviceSelect(smsSelect, data, previousSmsValue);
            } catch (error) {
                const callSelect = document.getElementById("deviceSelect");
                const smsSelect = document.getElementById("deviceSelectSms");
                populateDeviceSelect(callSelect, [], "");
                populateDeviceSelect(smsSelect, [], "");
            }
        }

        function populateDeviceSelect(select, devices, previousValue) {
            select.innerHTML = "";

            if (!Array.isArray(devices) || devices.length === 0) {
                const emptyOption = document.createElement("option");
                emptyOption.value = "";
                emptyOption.textContent = "No devices found";
                select.appendChild(emptyOption);
                return;
            }

            devices.forEach((device) => {
                const option = document.createElement("option");
                option.value = device.deviceUid;
                option.textContent = `${device.deviceUid} ${device.online ? "🟢" : "🔴"}`;
                select.appendChild(option);
            });

            const hasPrevious = devices.some((device) => device.deviceUid === previousValue);
            if (hasPrevious) {
                select.value = previousValue;
            }
        }

        async function loadCommands() {
            try {
                const res = await fetch(SERVER + "/commands");
                if (!res.ok) throw new Error("Failed to load commands");
                const data = await res.json();
                document.getElementById("commands").innerText =
                    JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById("commands").innerText = JSON.stringify({
                    error: error.message
                }, null, 2);
            }
        }

        function sanitizeDurationInput(event) {
            const input = event.target;
            input.value = input.value.replace(/[^\d]/g, "");
        }

        function getValidDurationSeconds(rawValue) {
            if (!rawValue) return null;
            const parsed = Number(rawValue);
            if (!Number.isInteger(parsed) || parsed <= 0) return null;
            return parsed;
        }

        async function sendCall() {
            const deviceUid = document.getElementById("deviceSelect").value;
            const phoneNumber = document.getElementById("phone").value;
            const scheduledAt = document.getElementById("scheduleTime").value;
            const durationRaw = document.getElementById("durationSeconds").value.trim();
            const durationSeconds = getValidDurationSeconds(durationRaw);

            const payload = {
                deviceUid,
                action: "call",
                phoneNumber,
                scheduledAt: scheduledAt || null
            };

            if (durationSeconds !== null) {
                payload.durationSeconds = durationSeconds;
            }

            console.log("Sending call command:", {
                phoneNumber,
                durationSeconds,
                deviceUid
            });

            try {
                const res = await fetch(SERVER + "/commands", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Failed to send command");

                alert("Command sent");
                await loadCommands();
            } catch (error) {
                alert(error.message);
            }
        }

        async function sendEndCall() {
            const deviceUid = document.getElementById("deviceSelect").value;
            const payload = {
                deviceUid,
                action: "end"
            };

            try {
                const res = await fetch(SERVER + "/commands", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Failed to send end command");

                alert("End command sent");
                await loadCommands();
            } catch (error) {
                alert(error.message);
            }
        }

        async function sendSms() {
            const deviceUid = document.getElementById("deviceSelectSms").value;
            const phoneNumber = document.getElementById("smsPhone").value;
            const message = document.getElementById("smsMessage").value;
            const scheduledAt = document.getElementById("smsScheduleTime").value;
            const payload = {
                deviceUid,
                type: "SMS",
                phoneNumber,
                message,
                scheduledAt: scheduledAt || null
            };

            try {
                const res = await fetch(SERVER + "/commands", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Failed to send SMS command");

                alert("SMS command sent");
                await loadCommands();
            } catch (error) {
                alert(error.message);
            }
        }

        async function clearCommands() {
            const isConfirmed = window.confirm("Are you sure you want to clear all commands?");
            if (!isConfirmed) return;

            try {
                const res = await fetch(SERVER + "/commands", {
                    method: "DELETE"
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Failed to clear commands");

                alert(data.message || "All commands cleared");
                await loadCommands();
            } catch (error) {
                alert(error.message);
            }
        }

        loadDevicesToSelect();
        loadDevices();
        loadCommands();
        setInterval(loadDevicesToSelect, 10000);
    </script>
</body>

</html>
