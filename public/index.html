<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoCall</title>
    <link rel="icon" type="image/png" href="/images/icon.png" />
    <style>
        :root {
            --bg-1: #0f172a;
            --bg-2: #0b2447;
            --accent: #2ec4b6;
            --accent-soft: #67e8f9;
            --text: #e6edf7;
            --muted: #a8b5c9;
            --glass: linear-gradient(145deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.03));
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 14px 36px rgba(4, 8, 26, 0.42);
            --glass-blur: blur(14px) saturate(135%);
            --control-height: 48px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at 15% 20%, rgba(46, 196, 182, 0.22), transparent 35%),
                radial-gradient(circle at 85% 10%, rgba(103, 232, 249, 0.2), transparent 30%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            padding: 24px;
        }

        .container {
            max-width: 1050px;
            margin: 0 auto;
            display: grid;
            gap: 18px;
        }

        .header {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-bottom: 1px solid rgba(255, 255, 255, 0.22);
            box-shadow: var(--glass-shadow);
            border-radius: 20px;
            padding: 18px 20px;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            position: sticky;
            top: 12px;
            z-index: 40;
            overflow: hidden;
            isolation: isolate;
        }

        .header::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at 8% 0%, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0) 58%);
            opacity: 0.7;
            z-index: 0;
        }

        .header::after {
            content: "";
            position: absolute;
            left: -16%;
            right: -16%;
            bottom: 0;
            height: 1px;
            pointer-events: none;
            background: linear-gradient(90deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.78) 24%,
                    rgba(255, 255, 255, 0.32) 58%,
                    rgba(255, 255, 255, 0) 100%);
            opacity: 0.34;
            transform: translateX(-12%);
            animation: glassThreadShift 5.8s ease-in-out infinite;
            z-index: 1;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 0.4px;
            position: relative;
            z-index: 2;
        }

        .header-title-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
            position: relative;
            z-index: 2;
        }

        .header-title-main {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
        }

        .download-apk-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
            border-radius: 12px;
            padding: 9px 13px;
            border: 1px solid rgba(103, 232, 249, 0.42);
            background: rgba(11, 18, 32, 0.42);
            color: #eaf7ff;
            font-size: 0.88rem;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(5, 10, 25, 0.3);
            transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .download-apk-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(5, 10, 25, 0.4);
            border-color: rgba(103, 232, 249, 0.7);
        }

        .download-apk-btn:hover .download-apk-icon {
            animation: downloadIconBounce 0.55s ease;
        }

        .download-apk-icon {
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            border: 1px solid rgba(103, 232, 249, 0.45);
            background: rgba(103, 232, 249, 0.15);
            line-height: 1;
            font-size: 0.8rem;
        }

        @keyframes downloadIconBounce {
            0% {
                transform: translateY(0);
            }

            35% {
                transform: translateY(-3px);
            }

            60% {
                transform: translateY(1px);
            }

            100% {
                transform: translateY(0);
            }
        }

        .header-logo {
            width: 66px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
            flex-shrink: 0;
        }

        .header p {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .session-info {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            z-index: 2;
        }

        .session-badge {
            padding: 7px 11px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(12, 20, 36, 0.45);
            color: var(--text);
            font-size: 0.86rem;
            line-height: 1;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 18px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            box-shadow: var(--glass-shadow);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }

        .card h2 {
            margin: 0 0 14px;
            font-size: 1.05rem;
            font-weight: 600;
            color: #f3f7ff;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .toggle-button {
            opacity: 0.82;
        }

        .toggle-button.active {
            opacity: 1;
            color: #f8fafc;
            background: linear-gradient(135deg, #475569, #334155);
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.45);
            transform: none;
        }

        .toggle-button.inactive {
            opacity: 1;
            box-shadow: 0 10px 24px rgba(46, 196, 182, 0.5);
            transform: translateY(-1px);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .panel-header h2 {
            margin: 0;
        }

        .panel-toggle-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 13px;
            font-size: 0.85rem;
        }

        .toggle-icon {
            position: relative;
            width: 18px;
            height: 12px;
            display: inline-block;
            border: 2px solid currentColor;
            border-radius: 50% / 65%;
            line-height: 1;
        }

        .toggle-icon::before {
            content: "";
            position: absolute;
            width: 4px;
            height: 4px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: currentColor;
        }

        .toggle-button.active .toggle-icon::after {
            content: "";
            position: absolute;
            left: -4px;
            right: -4px;
            top: 50%;
            border-top: 2px solid currentColor;
            transform: rotate(-24deg);
        }

        .segmented-control {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px;
            width: 100%;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: var(--glass);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.14);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            margin-bottom: 14px;
        }

        .segmented-option {
            flex: 1 1 0;
            min-width: 0;
            border: 0;
            border-radius: 999px;
            padding: 9px 18px;
            font-weight: 700;
            color: rgba(230, 237, 247, 0.72);
            background: transparent;
            box-shadow: none;
            transition: background-color 0.25s ease, color 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
        }

        .segmented-option:hover {
            transform: none;
            box-shadow: none;
            color: rgba(230, 237, 247, 0.95);
            background: rgba(255, 255, 255, 0.1);
        }

        .segmented-option.active {
            color: #0f172a;
            background: #ffffff;
            box-shadow: 0 8px 18px rgba(5, 10, 25, 0.22);
            animation: activeTabPop 0.26s ease;
        }

        .segmented-option.active:hover {
            transform: none;
            box-shadow: 0 8px 18px rgba(5, 10, 25, 0.22);
            background: #ffffff;
        }

        .inline-toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            height: var(--control-height);
            padding: 0 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: rgba(11, 18, 32, 0.35);
        }

        .inline-toggle-row span {
            color: var(--text);
            font-weight: 600;
            font-size: 0.92rem;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 30px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .switch-slider {
            position: absolute;
            inset: 0;
            cursor: pointer;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: background-color 0.25s ease, border-color 0.25s ease;
        }

        .switch-slider::before {
            content: "";
            position: absolute;
            height: 22px;
            width: 22px;
            left: 3px;
            top: 3px;
            border-radius: 50%;
            background: #ffffff;
            transition: transform 0.25s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        }

        .switch input:checked+.switch-slider {
            background: rgba(46, 196, 182, 0.75);
            border-color: rgba(103, 232, 249, 0.9);
        }

        .switch input:checked+.switch-slider::before {
            transform: translateX(22px);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .tab-panel.tab-enter-right {
            animation: tabSlideInRight 0.32s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .tab-panel.tab-enter-left {
            animation: tabSlideInLeft 0.32s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes tabSlideInRight {
            from {
                opacity: 0;
                transform: translateX(22px) scale(0.99);
            }

            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        @keyframes tabSlideInLeft {
            from {
                opacity: 0;
                transform: translateX(-22px) scale(0.99);
            }

            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        @keyframes activeTabPop {
            0% {
                transform: scale(0.98);
            }

            60% {
                transform: scale(1.02);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes glassThreadShift {
            0% {
                transform: translateX(-12%);
            }

            50% {
                transform: translateX(12%);
            }

            100% {
                transform: translateX(-12%);
            }
        }

        .panel-hidden {
            display: none;
        }

        .panel-collapsible {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transform: translateY(-8px);
            pointer-events: none;
            transition:
                max-height 0.42s cubic-bezier(0.22, 1, 0.36, 1),
                opacity 0.28s ease,
                transform 0.28s ease;
            will-change: max-height, opacity, transform;
        }

        .panel-collapsible.is-open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .toast-container {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 1200;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: min(360px, calc(100vw - 24px));
            pointer-events: none;
        }

        .toast {
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: rgba(12, 20, 36, 0.92);
            color: #e6edf7;
            padding: 11px 13px;
            font-size: 0.9rem;
            line-height: 1.45;
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.35);
            opacity: 0;
            transform: translateY(-8px) scale(0.98);
            animation: toastIn 0.22s ease forwards;
        }

        .toast.toast-success {
            border-color: rgba(46, 196, 182, 0.65);
            background: rgba(8, 44, 48, 0.94);
        }

        .toast.toast-error {
            border-color: rgba(239, 68, 68, 0.7);
            background: rgba(74, 20, 20, 0.94);
        }

        .toast.toast-info {
            border-color: rgba(103, 232, 249, 0.65);
            background: rgba(14, 41, 66, 0.94);
        }

        .toast.toast-out {
            animation: toastOut 0.2s ease forwards;
        }

        @keyframes toastIn {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes toastOut {
            to {
                opacity: 0;
                transform: translateY(-10px) scale(0.98);
            }
        }

        .full-width {
            grid-column: 1 / -1;
        }

        button {
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 12px;
            padding: 10px 14px;
            color: #06272f;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent-soft));
            transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 6px 18px rgba(46, 196, 182, 0.35);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 22px rgba(46, 196, 182, 0.45);
        }

        button:active {
            transform: translateY(0);
            opacity: 0.95;
        }

        .danger-button {
            color: #fff5f5;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 6px 18px rgba(220, 38, 38, 0.45);
        }

        .danger-button:hover {
            box-shadow: 0 10px 22px rgba(220, 38, 38, 0.58);
        }

        .input-row {
            display: grid;
            gap: 10px;
            margin-bottom: 12px;
        }

        .call-input-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
            align-items: end;
        }

        .call-input-grid-3 {
            grid-template-columns: minmax(0, 2fr) minmax(0, 3fr) minmax(0, 5fr);
            align-items: end;
        }

        .field-group {
            display: grid;
            gap: 6px;
        }

        .sms-input-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
            align-items: end;
        }

        .sms-message-full {
            grid-column: 1 / -1;
        }

        .auto-answer-input-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
            align-items: end;
        }

        .field-label {
            font-size: 0.84rem;
            color: var(--muted);
            margin-top: -2px;
            margin-bottom: -4px;
        }

        input,
        select,
        textarea {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 12px;
            padding: 10px 12px;
            background: rgba(11, 18, 32, 0.35);
            color: var(--text);
            outline: none;
        }

        input,
        select {
            height: var(--control-height);
        }

        input::placeholder {
            color: #bfd0ea;
            opacity: 0.7;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: rgba(103, 232, 249, 0.75);
            box-shadow: 0 0 0 3px rgba(103, 232, 249, 0.18);
        }

        textarea {
            min-height: 96px;
            resize: vertical;
            font-family: inherit;
        }

        pre {
            margin: 0;
            padding: 12px;
            min-height: 170px;
            max-height: 340px;
            overflow: auto;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(3, 8, 20, 0.45);
            color: #d9e8ff;
            line-height: 1.45;
            font-size: 0.86rem;
        }

        .table-wrapper {
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 12px;
            overflow: auto;
            background: rgba(3, 8, 20, 0.45);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        #devicesPanel .data-table {
            min-width: 420px;
        }

        .data-table th,
        .data-table td {
            text-align: left;
            padding: 11px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .data-table th {
            background: rgba(255, 255, 255, 0.1);
            color: #f3f7ff;
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            position: sticky;
            top: 0;
        }

        .data-table tbody tr:nth-child(even) td {
            background: rgba(255, 255, 255, 0.03);
        }

        .data-table tbody tr:hover td {
            background: rgba(103, 232, 249, 0.09);
        }

        .device-name-line {
            font-weight: 700;
            color: #f3f7ff;
            font-size: 0.92rem;
        }

        .device-uid-line {
            margin-top: 3px;
            font-size: 0.78rem;
            color: var(--muted);
            word-break: break-all;
            white-space: normal;
        }

        .rename-cell {
            min-width: 260px;
        }

        .rename-inline {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rename-inline input {
            min-width: 160px;
            padding: 8px 10px;
        }

        .rename-inline button {
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
        }

        .table-action-cell {
            width: 1%;
        }

        .device-delete-btn {
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #fff5f5;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 6px 18px rgba(220, 38, 38, 0.45);
        }

        .device-delete-btn:hover {
            box-shadow: 0 10px 22px rgba(220, 38, 38, 0.58);
        }

        .table-empty {
            margin: 0;
            padding: 16px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .json-fallback {
            display: none;
            margin-top: 10px;
            min-height: 0;
            max-height: 190px;
        }

        @media (max-width: 768px) {
            .header,
            .card,
            .segmented-control {
                backdrop-filter: blur(12px) saturate(128%);
                -webkit-backdrop-filter: blur(12px) saturate(128%);
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 14px;
            }

            .card,
            .header {
                border-radius: 16px;
                padding: 14px;
            }

            .header-title-row {
                align-items: center;
            }

            .header-title-main {
                gap: 8px;
            }

            .download-apk-btn {
                width: 100%;
                justify-content: center;
            }

            .call-input-grid {
                grid-template-columns: 1fr;
            }

            .call-input-grid-3 {
                grid-template-columns: 1fr;
            }

            .sms-input-grid {
                grid-template-columns: 1fr;
            }

            .auto-answer-input-grid {
                grid-template-columns: 1fr;
            }


        }

        @media (prefers-reduced-motion: reduce) {

            .segmented-option,
            .tab-panel {
                transition: none !important;
                animation: none !important;
            }
        }
    </style>
</head>

<body>
    <main class="container">
        <section class="header">
            <div class="header-title-row">
                <div class="header-title-main">
                    <h1>AutoCall Control Panel</h1>
                    <a
                        class="download-apk-btn"
                        href="https://github.com/yaserbr/AutoCall/releases/download/firstR/application-6ed7d3e5-b282-402d-95ff-c500d40fe7ab.apk"
                        target="_blank"
                        rel="noopener noreferrer">
                        <span class="download-apk-icon">&#8595;</span>
                        <span>Download APK</span>
                    </a>
                </div>
                <img class="header-logo" src="/images/icon.png" alt="AutoCall logo" />
            </div>
            <div id="sessionInfo" class="session-info panel-hidden">
                <span id="sessionUserLabel" class="session-badge">Signed out</span>
                <button class="danger-button" onclick="logout()">Logout</button>
            </div>
        </section>

        <section id="authSection" class="grid">
            <article class="card full-width">
                <h2>Login</h2>
                <div class="input-row call-input-grid">
                    <div class="field-group">
                        <label class="field-label" for="authUsername">Username</label>
                        <input id="authUsername" type="text" placeholder="your_username" />
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="authPassword">Password</label>
                        <input id="authPassword" type="password" placeholder="••••••••" />
                    </div>
                </div>
                <div class="actions">
                    <button onclick="login()">Login</button>
                </div>
            </article>
        </section>

        <section id="appSection" class="grid panel-hidden">
            <article class="card full-width">
                <h2>Command Center</h2>
                <div class="segmented-control" role="tablist" aria-label="Call SMS Auto Answer Open App WebView Toggle">
                    <button id="callTabBtn" class="segmented-option active" role="tab" aria-selected="true"
                        onclick="setActionTab('call')">Call</button>
                    <button id="smsTabBtn" class="segmented-option" role="tab" aria-selected="false"
                        onclick="setActionTab('sms')">SMS</button>
                    <button id="autoAnswerTabBtn" class="segmented-option" role="tab" aria-selected="false"
                        onclick="setActionTab('auto_answer')">Auto Answer</button>
                    <button id="openAppTabBtn" class="segmented-option" role="tab" aria-selected="false"
                        onclick="setActionTab('open_app')">Open App</button>
                    <button id="webViewTabBtn" class="segmented-option" role="tab" aria-selected="false"
                        onclick="setActionTab('webview')">WebView</button>
                </div>
                <div id="callTabPanel" class="tab-panel active">
                    <h2>Send Call</h2>
                    <div class="input-row call-input-grid">
                        <select id="deviceSelect"></select>
                        <input id="phone" placeholder="phone number" />
                    </div>
                    <div class="input-row call-input-grid-3">
                        <input id="durationSeconds" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="Call duration (seconds)" oninput="sanitizeDurationInput(event)" />
                        <input type="datetime-local" id="scheduleTime" />
                        <input id="callNotes" placeholder="optional notes" />
                    </div>
                    <div class="actions">
                        <button onclick="sendCall()">Call</button>
                        <button class="danger-button" onclick="sendEndCall()">End Call</button>
                    </div>
                </div>
                <div id="smsTabPanel" class="tab-panel">
                    <h2>Send SMS</h2>
                    <div class="input-row sms-input-grid">
                        <div class="field-group">
                            <input id="smsPhone" placeholder="phone number" />
                        </div>
                        <div class="field-group">
                            <select id="deviceSelectSms"></select>
                        </div>
                        <div class="field-group">
                            <input type="datetime-local" id="smsScheduleTime" />
                        </div>
                        <div class="field-group">
                            <input id="smsNotes" placeholder="optional notes" />
                        </div>
                        <div class="field-group sms-message-full">
                            <textarea id="smsMessage" placeholder="SMS message"></textarea>
                        </div>
                    </div>
                    <div class="actions">
                        <button onclick="sendSms()">Send SMS</button>
                    </div>
                </div>
                <div id="autoAnswerTabPanel" class="tab-panel">
                    <h2>Auto Answer</h2>
                    <div class="input-row auto-answer-input-grid">
                        <select id="deviceSelectAutoAnswer"></select>
                        <div class="inline-toggle-row">
                            <span>Auto Answer (On / Off)</span>
                            <label class="switch">
                                <input id="autoAnswerEnabled" type="checkbox" checked />
                                <span class="switch-slider"></span>
                            </label>
                        </div>
                        <input id="autoAnswerHangupSeconds" type="text" inputmode="numeric" pattern="[0-9]*"
                            placeholder="Auto hangup seconds" oninput="sanitizeDurationInput(event)" />
                        <input id="autoAnswerNotes" placeholder="optional notes" />
                    </div>
                    <div class="actions">
                        <button onclick="sendAutoAnswer()">Apply Auto Answer</button>
                    </div>
                </div>
                <div id="webViewTabPanel" class="tab-panel">
                    <h2>WebView Commands</h2>
                    <div class="segmented-control" role="tablist" aria-label="WebView command action toggle">
                        <button id="openUrlActionBtn" class="segmented-option active" role="tab" aria-selected="true"
                            onclick="setWebViewCommandAction('open_url')">OPEN_URL</button>
                        <button id="closeWebViewActionBtn" class="segmented-option" role="tab" aria-selected="false"
                            onclick="setWebViewCommandAction('close_webview')">CLOSE_WEBVIEW</button>
                    </div>
                    <div class="input-row auto-answer-input-grid">
                        <select id="deviceSelectWebView"></select>
                        <div id="openUrlFieldGroup" class="field-group">
                            <input id="webViewUrl" placeholder="https://example.com" />
                        </div>
                        <div id="webViewNotesFieldGroup" class="field-group">
                            <input id="webViewNotes" placeholder="optional notes" />
                        </div>
                    </div>
                    <div class="actions">
                        <button id="sendWebViewCommandBtn" onclick="sendWebViewCommand()">Send OPEN_URL</button>
                    </div>
                </div>
                <div id="openAppTabPanel" class="tab-panel">
                    <h2>Open App</h2>
                    <div class="input-row auto-answer-input-grid">
                        <select id="deviceSelectOpenApp"></select>
                        <input id="openAppName" placeholder="e.g. YouTube, WhatsApp, Telegram" />
                        <input id="openAppNotes" placeholder="optional notes" />
                    </div>
                    <div class="actions">
                        <button onclick="sendOpenApp()">Send OPEN_APP</button>
                        <button onclick="sendReturnToAutoCall()">Return to AutoCall</button>
                    </div>
                </div>
            </article>

            <article id="devicesPanel" class="card full-width">
                <div class="panel-header">
                    <h2>Devices</h2>
                    <button id="toggleDevicesBtn" class="toggle-button panel-toggle-btn inactive"
                        onclick="togglePanel('devices')">
                        <span id="toggleDevicesIcon" class="toggle-icon" aria-hidden="true"></span>
                        <span id="toggleDevicesLabel">Show</span>
                    </button>
                </div>
                <div id="devicesPanelContent" class="panel-collapsible">
                    <div class="actions">
                        <button onclick="loadDevices()">Refresh</button>
                    </div>
                    <div id="devicesTable" class="table-wrapper"></div>
                    <pre id="devices" class="json-fallback"></pre>
                </div>
            </article>

            <article id="commandsPanel" class="card full-width">
                <div class="panel-header">
                    <h2>Commands</h2>
                    <button id="toggleCommandsBtn" class="toggle-button panel-toggle-btn inactive"
                        onclick="togglePanel('commands')">
                        <span id="toggleCommandsIcon" class="toggle-icon" aria-hidden="true"></span>
                        <span id="toggleCommandsLabel">Show</span>
                    </button>
                </div>
                <div id="commandsPanelContent" class="panel-collapsible">
                    <div class="actions">
                        <button onclick="loadCommands()">Refresh</button>
                        <button onclick="clearCommands()">Clear Commands</button>
                    </div>
                    <div id="commandsTable" class="table-wrapper"></div>
                    <pre id="commands" class="json-fallback"></pre>
                </div>
            </article>
        </section>
    </main>
    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script>
        const SERVER =
            window.location.hostname === "localhost"
                ? "http://localhost:4000"
                : "https://serverautocall-production.up.railway.app";
        const AUTH_TOKEN_STORAGE_KEY = "autocall.accessToken";
        let activeTab = "call";
        let activeWebViewAction = "open_url";
        let authToken = "";
        let authenticatedUser = null;
        let refreshDevicesIntervalId = null;
        const panelVisibility = {
            devices: false,
            commands: false
        };
        const prioritizeActiveStatuses = true;
        const statusPriority = {
            executing: 0,
            pending: 1,
            executed: 2,
            failed: 3
        };
        const statusIcons = {
            executed: "🟢",
            failed: "🔴",
            pending: "🟡",
            executing: "🔵"
        };
        const tabOrder = {
            call: 0,
            sms: 1,
            auto_answer: 2,
            open_app: 3,
            webview: 4
        };
        const deviceNameByUid = new Map();

        function normalizeUsername(value) {
            if (typeof value !== "string") return "";
            return value.trim().toLowerCase();
        }

        function rememberDevices(devices) {
            deviceNameByUid.clear();
            if (!Array.isArray(devices)) return;

            devices.forEach((device) => {
                const rawUid = typeof device?.deviceUid === "string" ? device.deviceUid.trim().toLowerCase() : "";
                const rawName = typeof device?.deviceName === "string" ? device.deviceName.trim() : "";
                if (!rawUid) return;
                if (rawName) {
                    deviceNameByUid.set(rawUid, rawName);
                }
            });
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll("\"", "&quot;")
                .replaceAll("'", "&#39;");
        }

        function asDisplayValue(value) {
            return value === null || value === undefined || value === "" ? "-" : String(value);
        }

        function showToast(message, type = "info") {
            const container = document.getElementById("toastContainer");
            if (!container) return;

            const toast = document.createElement("div");
            toast.className = `toast toast-${type}`;
            toast.textContent = String(message || "");
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add("toast-out");
                setTimeout(() => {
                    toast.remove();
                }, 220);
            }, 5000);
        }

        function parseApiErrorMessage(payload, fallbackMessage) {
            if (payload && typeof payload.error === "string" && payload.error.trim()) {
                return payload.error.trim();
            }
            return fallbackMessage;
        }

        function setAuthenticatedUser(accessToken, user, persistToken = true) {
            authToken = typeof accessToken === "string" ? accessToken.trim() : "";
            authenticatedUser = user && typeof user === "object" ? user : null;

            if (persistToken && authToken) {
                localStorage.setItem(AUTH_TOKEN_STORAGE_KEY, authToken);
            }

            const authSection = document.getElementById("authSection");
            const appSection = document.getElementById("appSection");
            const sessionInfo = document.getElementById("sessionInfo");
            const sessionUserLabel = document.getElementById("sessionUserLabel");

            const displayName =
                (typeof authenticatedUser?.username === "string" && authenticatedUser.username.trim()) ||
                "Signed in";

            if (sessionUserLabel) {
                sessionUserLabel.textContent = displayName;
            }
            if (authSection) {
                authSection.classList.add("panel-hidden");
            }
            if (appSection) {
                appSection.classList.remove("panel-hidden");
            }
            if (sessionInfo) {
                sessionInfo.classList.remove("panel-hidden");
            }
        }

        function clearAuthenticatedUser(removeStoredToken = true) {
            authToken = "";
            authenticatedUser = null;
            deviceNameByUid.clear();
            stopDevicesSelectRefresh();

            const authSection = document.getElementById("authSection");
            const appSection = document.getElementById("appSection");
            const sessionInfo = document.getElementById("sessionInfo");
            const sessionUserLabel = document.getElementById("sessionUserLabel");

            if (sessionUserLabel) {
                sessionUserLabel.textContent = "Signed out";
            }
            if (authSection) {
                authSection.classList.remove("panel-hidden");
            }
            if (appSection) {
                appSection.classList.add("panel-hidden");
            }
            if (sessionInfo) {
                sessionInfo.classList.add("panel-hidden");
            }

            renderDevicesTable([]);
            renderCommandsTable([]);
            setRawFallback("devices", [], false);
            setRawFallback("commands", [], false);

            if (removeStoredToken) {
                localStorage.removeItem(AUTH_TOKEN_STORAGE_KEY);
            }
        }

        function stopDevicesSelectRefresh() {
            if (refreshDevicesIntervalId) {
                clearInterval(refreshDevicesIntervalId);
                refreshDevicesIntervalId = null;
            }
        }

        function startDevicesSelectRefresh() {
            stopDevicesSelectRefresh();
            refreshDevicesIntervalId = setInterval(() => {
                void loadDevicesToSelect();
            }, 10000);
        }

        async function apiFetch(path, options = {}) {
            const isAuthRoute = path.startsWith("/auth/");
            const headers = {
                ...(options.headers || {})
            };

            if (!isAuthRoute) {
                if (!authToken) {
                    throw new Error("Please login first");
                }
                headers.Authorization = `Bearer ${authToken}`;
            }

            const response = await fetch(SERVER + path, {
                ...options,
                headers
            });

            if (!isAuthRoute && response.status === 401) {
                clearAuthenticatedUser(true);
                throw new Error("Session expired. Please login again.");
            }

            return response;
        }

        async function fetchCurrentUserProfile(token) {
            const response = await fetch(SERVER + "/auth/me", {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            });

            if (!response.ok) {
                return null;
            }

            const payload = await response.json();
            return payload?.user ?? null;
        }

        async function initializeSession() {
            const storedToken = localStorage.getItem(AUTH_TOKEN_STORAGE_KEY);
            if (!storedToken) {
                clearAuthenticatedUser(false);
                return;
            }

            try {
                const user = await fetchCurrentUserProfile(storedToken);
                if (!user) {
                    clearAuthenticatedUser(true);
                    return;
                }

                setAuthenticatedUser(storedToken, user, false);
                await loadDevicesToSelect();
                await loadDevices();
                await loadCommands();
                startDevicesSelectRefresh();
            } catch (_error) {
                clearAuthenticatedUser(true);
            }
        }

        async function login() {
            const username = normalizeUsername(document.getElementById("authUsername")?.value || "");
            const password = String(document.getElementById("authPassword")?.value || "");

            if (!username || !password) {
                showToast("Username and password are required", "error");
                return;
            }

            try {
                const response = await apiFetch("/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, password })
                });
                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(parseApiErrorMessage(payload, "Login failed"));
                }

                const token = typeof payload.accessToken === "string" ? payload.accessToken : "";
                if (!token) {
                    throw new Error("Login failed: missing access token");
                }

                setAuthenticatedUser(token, payload.user ?? null, true);
                await loadDevicesToSelect();
                await loadDevices();
                await loadCommands();
                startDevicesSelectRefresh();
                showToast("Logged in successfully", "success");
            } catch (error) {
                showToast(error.message || "Login failed", "error");
            }
        }

        function logout() {
            clearAuthenticatedUser(true);
            showToast("Logged out", "info");
        }

        function parseDateValue(dateText) {
            if (!dateText) return 0;

            if (typeof dateText === "number") {
                return Number.isFinite(dateText) ? dateText : 0;
            }

            if (typeof dateText !== "string") {
                return 0;
            }

            const normalized = dateText.trim();
            const localFormatMatch = normalized.match(/^(\d{2})\/(\d{2})\/(\d{4}),\s*(\d{2}):(\d{2}):(\d{2})$/);
            if (localFormatMatch) {
                const [, day, month, year, hour, minute, second] = localFormatMatch;
                return new Date(
                    Number(year),
                    Number(month) - 1,
                    Number(day),
                    Number(hour),
                    Number(minute),
                    Number(second)
                ).getTime();
            }

            const parsed = Date.parse(normalized);
            return Number.isNaN(parsed) ? 0 : parsed;
        }

        function setRawFallback(id, value, showFallback) {
            const pre = document.getElementById(id);
            pre.innerText = JSON.stringify(value, null, 2);
            pre.style.display = showFallback ? "block" : "none";
        }

        function renderDevicesTable(devices) {
            const container = document.getElementById("devicesTable");
            if (!Array.isArray(devices) || devices.length === 0) {
                container.innerHTML = "<p class='table-empty'>No devices available.</p>";
                return;
            }

            const rows = devices.map((device, index) => {
                const rawUid = typeof device.deviceUid === "string" ? device.deviceUid : "";
                const uid = escapeHtml(asDisplayValue(device.deviceUid));
                const deviceName = escapeHtml(asDisplayValue(device.deviceName));
                const renameValue = escapeHtml(typeof device.deviceName === "string" ? device.deviceName : "");
                const escapedRawUid = escapeHtml(rawUid);
                const renameInputId = `renameDeviceInput_${index}`;
                const onlineIndicator = device.online ? "🟢" : "🔴";
                const lastSeen = escapeHtml(asDisplayValue(device.lastSeen));
                return `
                    <tr>
                        <td>
                            <div class="device-name-line">${deviceName}</div>
                            <div class="device-uid-line">${uid}</div>
                        </td>
                        <td>${lastSeen} ${onlineIndicator}</td>
                        <td class="rename-cell">
                            <div class="rename-inline">
                                <input id="${renameInputId}" placeholder="Device name" value="${renameValue}" />
                                <button
                                    type="button"
                                    class="rename-device-btn"
                                    data-device-uid="${escapedRawUid}"
                                    data-input-id="${renameInputId}">
                                    Rename
                                </button>
                            </div>
                        </td>
                        <td class="table-action-cell">
                            <button
                                type="button"
                                class="device-delete-btn"
                                data-device-uid="${escapedRawUid}">
                                Delete
                            </button>
                        </td>
                    </tr>
                `;
            }).join("");

            container.innerHTML = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Device</th>
                            <th>Last Seen</th>
                            <th>Rename</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;

            container.querySelectorAll(".rename-device-btn").forEach((button) => {
                button.addEventListener("click", async () => {
                    const deviceUid = button.getAttribute("data-device-uid") || "";
                    const inputId = button.getAttribute("data-input-id") || "";
                    await renameDevice(deviceUid, inputId);
                });
            });

            container.querySelectorAll(".device-delete-btn").forEach((button) => {
                button.addEventListener("click", async () => {
                    const deviceUid = button.getAttribute("data-device-uid") || "";
                    await deleteDevice(deviceUid);
                });
            });
        }

        function formatCommandStatus(status) {
            const normalized = String(status || "").toLowerCase();
            const fallbackStatus = normalized || "unknown";
            const icon = statusIcons[normalized] || "⚪";
            return `${fallbackStatus} ${icon}`;
        }

        function sortCommands(commands) {
            return [...commands].sort((a, b) => {
                const aStatus = String(a.status || "").toLowerCase();
                const bStatus = String(b.status || "").toLowerCase();
                const aPriority = aStatus in statusPriority ? statusPriority[aStatus] : Number.MAX_SAFE_INTEGER;
                const bPriority = bStatus in statusPriority ? statusPriority[bStatus] : Number.MAX_SAFE_INTEGER;

                if (prioritizeActiveStatuses && aPriority !== bPriority) {
                    return aPriority - bPriority;
                }

                return parseDateValue(b.createdAt) - parseDateValue(a.createdAt);
            });
        }

        function renderCommandsTable(commands) {
            const container = document.getElementById("commandsTable");
            if (!Array.isArray(commands) || commands.length === 0) {
                container.innerHTML = "<p class='table-empty'>No commands available.</p>";
                return;
            }

            const rows = sortCommands(commands).map((command) => {
                const normalizedUid =
                    typeof command.deviceUid === "string" ? command.deviceUid.trim().toLowerCase() : "";
                const resolvedName =
                    (typeof command.deviceName === "string" && command.deviceName.trim()) ||
                    deviceNameByUid.get(normalizedUid) ||
                    "-";
                const device = `
                    <div class="device-name-line">${escapeHtml(asDisplayValue(resolvedName))}</div>
                    <div class="device-uid-line">${escapeHtml(asDisplayValue(command.deviceUid))}</div>
                `;
                const type = escapeHtml(asDisplayValue(command.type));
                const appName = escapeHtml(asDisplayValue(command.appName));
                const phone = escapeHtml(asDisplayValue(command.phoneNumber));
                const message = escapeHtml(asDisplayValue(command.message));
                const url = escapeHtml(asDisplayValue(command.url));
                const notes = escapeHtml(asDisplayValue(command.notes));
                const status = escapeHtml(formatCommandStatus(command.status));
                const createdAt = escapeHtml(asDisplayValue(command.createdAt));

                return `
                    <tr>
                        <td>${device}</td>
                        <td>${type}</td>
                        <td>${status}</td>
                        <td>${createdAt}</td>
                        <td>${appName}</td>
                        <td>${phone}</td>
                        <td>${message}</td>
                        <td>${url}</td>
                        <td>${notes}</td>
                    </tr>
                `;
            }).join("");

            container.innerHTML = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Device</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Created At</th>
                            <th>App Name</th>
                            <th>Phone</th>
                            <th>Message</th>
                            <th>URL</th>
                            <th>Notes</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        function setActionTab(tab) {
            const targetTab = tabOrder[tab] !== undefined ? tab : "call";
            const previousTab = activeTab;
            activeTab = targetTab;
            const isCall = activeTab === "call";
            const isSms = activeTab === "sms";
            const isAutoAnswer = activeTab === "auto_answer";
            const isOpenApp = activeTab === "open_app";
            const isWebView = activeTab === "webview";

            const callPanel = document.getElementById("callTabPanel");
            const smsPanel = document.getElementById("smsTabPanel");
            const autoAnswerPanel = document.getElementById("autoAnswerTabPanel");
            const openAppPanel = document.getElementById("openAppTabPanel");
            const webViewPanel = document.getElementById("webViewTabPanel");
            const panels = [callPanel, smsPanel, autoAnswerPanel, openAppPanel, webViewPanel];
            panels.forEach((panel) => panel.classList.remove("tab-enter-left", "tab-enter-right"));

            callPanel.classList.toggle("active", isCall);
            smsPanel.classList.toggle("active", isSms);
            autoAnswerPanel.classList.toggle("active", isAutoAnswer);
            openAppPanel.classList.toggle("active", isOpenApp);
            webViewPanel.classList.toggle("active", isWebView);

            if (targetTab !== previousTab) {
                const targetPanel = isCall
                    ? callPanel
                    : isSms
                        ? smsPanel
                        : isAutoAnswer
                            ? autoAnswerPanel
                            : isOpenApp
                                ? openAppPanel
                            : webViewPanel;
                const movingForward = tabOrder[targetTab] > tabOrder[previousTab];
                const animationClass = movingForward ? "tab-enter-right" : "tab-enter-left";
                void targetPanel.offsetWidth;
                targetPanel.classList.add(animationClass);
            }

            document.getElementById("callTabBtn").classList.toggle("active", isCall);
            document.getElementById("smsTabBtn").classList.toggle("active", isSms);
            document.getElementById("autoAnswerTabBtn").classList.toggle("active", isAutoAnswer);
            document.getElementById("openAppTabBtn").classList.toggle("active", isOpenApp);
            document.getElementById("webViewTabBtn").classList.toggle("active", isWebView);

            document.getElementById("callTabBtn").setAttribute("aria-selected", String(isCall));
            document.getElementById("smsTabBtn").setAttribute("aria-selected", String(isSms));
            document.getElementById("autoAnswerTabBtn").setAttribute("aria-selected", String(isAutoAnswer));
            document.getElementById("openAppTabBtn").setAttribute("aria-selected", String(isOpenApp));
            document.getElementById("webViewTabBtn").setAttribute("aria-selected", String(isWebView));
        }

        function updatePanelToggleUI(panelName) {
            const isDevices = panelName === "devices";
            const buttonId = isDevices ? "toggleDevicesBtn" : "toggleCommandsBtn";
            const labelId = isDevices ? "toggleDevicesLabel" : "toggleCommandsLabel";
            const isVisible = panelVisibility[panelName];

            const button = document.getElementById(buttonId);
            const label = document.getElementById(labelId);

            button.classList.toggle("active", isVisible);
            button.classList.toggle("inactive", !isVisible);
            label.textContent = isVisible ? "Hide" : "Show";
        }

        function setPanelContentVisibility(contentElement, isVisible) {
            if (!contentElement) return;

            if (isVisible) {
                contentElement.classList.add("is-open");
                contentElement.style.maxHeight = "0px";
                requestAnimationFrame(() => {
                    contentElement.style.maxHeight = `${contentElement.scrollHeight}px`;
                });

                const handleOpenEnd = (event) => {
                    if (event.propertyName !== "max-height") return;
                    if (contentElement.classList.contains("is-open")) {
                        contentElement.style.maxHeight = "none";
                    }
                    contentElement.removeEventListener("transitionend", handleOpenEnd);
                };
                contentElement.addEventListener("transitionend", handleOpenEnd);
            } else {
                const currentHeight = contentElement.scrollHeight;
                contentElement.style.maxHeight = `${currentHeight}px`;
                void contentElement.offsetHeight;
                contentElement.classList.remove("is-open");
                contentElement.style.maxHeight = "0px";
            }
        }

        async function togglePanel(panelName) {
            const isDevices = panelName === "devices";
            const contentId = isDevices ? "devicesPanelContent" : "commandsPanelContent";

            panelVisibility[panelName] = !panelVisibility[panelName];
            const isVisible = panelVisibility[panelName];

            const contentElement = document.getElementById(contentId);
            setPanelContentVisibility(contentElement, isVisible);
            updatePanelToggleUI(panelName);

            if (isVisible) {
                if (isDevices) {
                    await loadDevices();
                } else {
                    await loadCommands();
                }
            }
        }

        async function loadDevices() {
            try {
                const res = await apiFetch("/devices");
                if (!res.ok) throw new Error("Failed to load devices");
                const data = await res.json();
                rememberDevices(data);
                renderDevicesTable(data);
                setRawFallback("devices", data, false);
            } catch (error) {
                renderDevicesTable([]);
                setRawFallback("devices", {
                    error: error.message
                }, true);
            }
        }

        async function renameDevice(deviceUid, inputId) {
            const input = document.getElementById(inputId);
            if (!input) return;

            const deviceName = input.value.trim();
            if (!deviceName) {
                showToast("Please enter a device name", "error");
                return;
            }

            try {
                const res = await apiFetch("/devices/rename", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        deviceUid,
                        deviceName
                    })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Failed to rename device");

                await loadDevices();
                await loadDevicesToSelect();
            } catch (error) {
                showToast(error.message, "error");
            }
        }

        async function deleteDevice(deviceUid) {
            if (!deviceUid) {
                showToast("Invalid device UID", "error");
                return;
            }

            try {
                const res = await apiFetch("/devices/" + encodeURIComponent(deviceUid), {
                    method: "DELETE"
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Failed to delete device");

                showToast("Device delete command executed", "success");
                await loadDevices();
                await loadDevicesToSelect();
            } catch (error) {
                showToast(error.message || "Failed to delete device", "error");
            }
        }

        async function loadDevicesToSelect() {
            try {
                const res = await apiFetch("/devices");
                if (!res.ok) throw new Error("Failed to load devices");
                const data = await res.json();
                const callSelect = document.getElementById("deviceSelect");
                const smsSelect = document.getElementById("deviceSelectSms");
                const autoAnswerSelect = document.getElementById("deviceSelectAutoAnswer");
                const openAppSelect = document.getElementById("deviceSelectOpenApp");
                const webViewSelect = document.getElementById("deviceSelectWebView");
                const previousCallValue = callSelect.value;
                const previousSmsValue = smsSelect.value;
                const previousAutoAnswerValue = autoAnswerSelect.value;
                const previousOpenAppValue = openAppSelect.value;
                const previousWebViewValue = webViewSelect.value;

                rememberDevices(data);
                populateDeviceSelect(callSelect, data, previousCallValue);
                populateDeviceSelect(smsSelect, data, previousSmsValue);
                populateDeviceSelect(autoAnswerSelect, data, previousAutoAnswerValue);
                populateDeviceSelect(openAppSelect, data, previousOpenAppValue);
                populateDeviceSelect(webViewSelect, data, previousWebViewValue);
            } catch (error) {
                const callSelect = document.getElementById("deviceSelect");
                const smsSelect = document.getElementById("deviceSelectSms");
                const autoAnswerSelect = document.getElementById("deviceSelectAutoAnswer");
                const openAppSelect = document.getElementById("deviceSelectOpenApp");
                const webViewSelect = document.getElementById("deviceSelectWebView");
                populateDeviceSelect(callSelect, [], "");
                populateDeviceSelect(smsSelect, [], "");
                populateDeviceSelect(autoAnswerSelect, [], "");
                populateDeviceSelect(openAppSelect, [], "");
                populateDeviceSelect(webViewSelect, [], "");
            }
        }

        function populateDeviceSelect(select, devices, previousValue) {
            select.innerHTML = "";

            if (!Array.isArray(devices) || devices.length === 0) {
                const emptyOption = document.createElement("option");
                emptyOption.value = "";
                emptyOption.textContent = "No devices found";
                select.appendChild(emptyOption);
                return;
            }

            devices.forEach((device) => {
                const option = document.createElement("option");
                option.value = device.deviceUid;
                option.textContent =
                    `${device.deviceName || device.deviceUid} (${device.deviceUid}) ${device.online ? "🟢" : "🔴"}`;
                select.appendChild(option);
            });

            const hasPrevious = devices.some((device) => device.deviceUid === previousValue);
            if (hasPrevious) {
                select.value = previousValue;
            }
        }

        async function loadCommands() {
            try {
                const res = await apiFetch("/commands");
                if (!res.ok) throw new Error("Failed to load commands");
                const data = await res.json();
                renderCommandsTable(data);
                setRawFallback("commands", data, false);
            } catch (error) {
                renderCommandsTable([]);
                setRawFallback("commands", {
                    error: error.message
                }, true);
            }
        }

        function sanitizeDurationInput(event) {
            const input = event.target;
            input.value = input.value.replace(/[^\d]/g, "");
        }

        function getValidDurationSeconds(rawValue) {
            if (!rawValue) return null;
            const parsed = Number(rawValue);
            if (!Number.isInteger(parsed) || parsed <= 0) return null;
            return parsed;
        }

        function isValidHttpUrl(value) {
            if (typeof value !== "string") return false;
            const trimmed = value.trim();
            if (!trimmed) return false;
            try {
                const parsed = new URL(trimmed);
                return parsed.protocol === "http:" || parsed.protocol === "https:";
            } catch (_error) {
                return false;
            }
        }

        function setWebViewCommandAction(action) {
            const normalizedAction = action === "close_webview" ? "close_webview" : "open_url";
            activeWebViewAction = normalizedAction;
            const isOpenUrl = normalizedAction === "open_url";

            const openUrlBtn = document.getElementById("openUrlActionBtn");
            const closeWebViewBtn = document.getElementById("closeWebViewActionBtn");
            const openUrlFieldGroup = document.getElementById("openUrlFieldGroup");
            const webViewNotesFieldGroup = document.getElementById("webViewNotesFieldGroup");
            const sendButton = document.getElementById("sendWebViewCommandBtn");

            openUrlBtn.classList.toggle("active", isOpenUrl);
            closeWebViewBtn.classList.toggle("active", !isOpenUrl);
            openUrlBtn.setAttribute("aria-selected", String(isOpenUrl));
            closeWebViewBtn.setAttribute("aria-selected", String(!isOpenUrl));

            openUrlFieldGroup.style.display = isOpenUrl ? "grid" : "none";
            webViewNotesFieldGroup.style.display = isOpenUrl ? "grid" : "none";
            sendButton.textContent = isOpenUrl ? "Send OPEN_URL" : "Send CLOSE_WEBVIEW";
            sendButton.classList.toggle("danger-button", !isOpenUrl);
        }

        async function sendWebViewCommand() {
            const deviceUid = document.getElementById("deviceSelectWebView").value;
            const notes = document.getElementById("webViewNotes").value.trim();
            const isOpenUrl = activeWebViewAction === "open_url";

            if (!deviceUid) {
                showToast("Please select a device first", "error");
                return;
            }

            const payload = {
                deviceUid,
                action: isOpenUrl ? "open_url" : "close_webview",
                type: isOpenUrl ? "OPEN_URL" : "CLOSE_WEBVIEW"
            };

            if (isOpenUrl) {
                const rawUrl = document.getElementById("webViewUrl").value.trim();
                if (!rawUrl) {
                    showToast("URL is required for OPEN_URL", "error");
                    return;
                }
                if (!isValidHttpUrl(rawUrl)) {
                    showToast("URL must start with http:// or https://", "error");
                    return;
                }
                payload.url = rawUrl;
                payload.notes = notes || null;
            }

            try {
                const res = await apiFetch("/commands", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Failed to send WebView command");

                showToast(isOpenUrl ? "OPEN_URL command sent" : "CLOSE_WEBVIEW command sent", "success");
                await loadCommands();
            } catch (error) {
                showToast(error.message, "error");
            }
        }

        async function sendOpenApp() {
            const deviceUid = document.getElementById("deviceSelectOpenApp").value;
            const appName = document.getElementById("openAppName").value.trim();
            const notes = document.getElementById("openAppNotes").value.trim();

            if (!deviceUid) {
                showToast("Please select a device first", "error");
                return;
            }
            if (!appName) {
                showToast("App Name is required", "error");
                return;
            }

            const payload = {
                deviceUid,
                action: "open_app",
                type: "OPEN_APP",
                appName,
                notes: notes || null
            };

            try {
                const res = await apiFetch("/commands", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Failed to send OPEN_APP command");

                showToast("OPEN_APP command sent", "success");
                await loadCommands();
            } catch (error) {
                showToast(error.message, "error");
            }
        }

        async function sendReturnToAutoCall() {
            const deviceUid = document.getElementById("deviceSelectOpenApp").value;

            if (!deviceUid) {
                showToast("Please select a device first", "error");
                return;
            }

            const payload = {
                deviceUid,
                action: "return_to_autocall",
                type: "RETURN_TO_AUTOCALL"
            };

            try {
                const res = await apiFetch("/commands", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Failed to send RETURN_TO_AUTOCALL command");

                showToast("RETURN_TO_AUTOCALL command sent", "success");
                await loadCommands();
            } catch (error) {
                showToast(error.message, "error");
            }
        }

        async function sendCall() {
            const deviceUid = document.getElementById("deviceSelect").value;
            const phoneNumber = document.getElementById("phone").value;
            const scheduledAt = document.getElementById("scheduleTime").value;
            const durationRaw = document.getElementById("durationSeconds").value.trim();
            const durationSeconds = getValidDurationSeconds(durationRaw);
            const notes = document.getElementById("callNotes").value.trim();

            const payload = {
                deviceUid,
                action: "call",
                phoneNumber,
                scheduledAt: scheduledAt || null,
                notes: notes || null
            };

            if (durationSeconds !== null) {
                payload.durationSeconds = durationSeconds;
            }

            console.log("Sending call command:", {
                phoneNumber,
                durationSeconds,
                deviceUid
            });

            try {
                const res = await apiFetch("/commands", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Failed to send command");

                showToast("Command sent", "success");
                await loadCommands();
            } catch (error) {
                showToast(error.message, "error");
            }
        }

        async function sendEndCall() {
            const deviceUid = document.getElementById("deviceSelect").value;
            const payload = {
                deviceUid,
                action: "end"
            };

            try {
                const res = await apiFetch("/commands", {
                    method: "POST",

                showToast("End command sent", "success");

                showToast(error.message, "error");
            }
        }

        async function sendSms() {
            const deviceUid = document.getElementById("deviceSelectSms").value;
            const phoneNumber = document.getElementById("smsPhone").value;
            const message = document.getElementById("smsMessage").value;
            const scheduledAt = document.getElementById("smsScheduleTime").value;
            const notes = document.getElementById("smsNotes").value.trim();
            const payload = {
                deviceUid,
                type: "SMS",
                phoneNumber,
                message,
                scheduledAt: scheduledAt || null,
                notes: notes || null
            };

            try {
                const res = await apiFetch("/commands", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Failed to send SMS command");

                showToast("SMS command sent", "success");
                await loadCommands();
            } catch (error) {
                showToast(error.message, "error");
            }
        }

        async function sendAutoAnswer() {
            const deviceUid = document.getElementById("deviceSelectAutoAnswer").value;
            const enabled = document.getElementById("autoAnswerEnabled").checked;
            const rawHangupSeconds = document.getElementById("autoAnswerHangupSeconds").value.trim();
            const parsedHangupSeconds = getValidDurationSeconds(rawHangupSeconds);
            const notes = document.getElementById("autoAnswerNotes").value.trim();

            if (!deviceUid) {
                showToast("Please select a device first", "error");
                return;
            }

            const payload = {
                deviceUid,
                type: "AUTO_ANSWER",
                enabled,
                notes: notes || null
            };

            if (enabled) {
                if (parsedHangupSeconds === null) {
                    showToast("Please enter a valid auto hangup seconds value", "error");
                    return;
                }
                payload.autoHangupSeconds = parsedHangupSeconds;
            }

            try {
                const res = await apiFetch("/commands", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Failed to apply auto answer");

                showToast("Auto Answer command sent", "success");
                await loadCommands();
            } catch (error) {
                showToast(error.message, "error");
            }
        }

        function clearCommands() {
            renderCommandsTable([]);
            setRawFallback("commands", [], false);
            showToast("Commands cleared", "success");
        }

        setWebViewCommandAction("open_url");
        updatePanelToggleUI("devices");
        updatePanelToggleUI("commands");
        initializeSession();
    </script>
</body>
